            "16.0.3.0020|16.0.3|Firmware 16.0.3|2023-05-09"
            "16.0.3.5020|16.0.3-rebootless1|Firmware 16.0.3 [Rebootless Update 1]|2023-05-30"
            "16.0.3.6020|16.0.3-rebootless2|Firmware 16.0.3 [Rebootless Update 2]|2023-06-27"
