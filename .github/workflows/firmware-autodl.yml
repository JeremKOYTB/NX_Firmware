            "12.0.1.0040|12.0.1|Firmware 12.0.1|2021-04-20"
            "12.0.2.0020|12.0.2|Firmware 12.0.2|2021-05-12"
            "12.0.3.0020|12.0.3|Firmware 12.0.3|2021-06-08"
            "12.1.0.0120|12.1.0|Firmware 12.1.0|2021-07-06"
            "13.0.0.0220|13.0.0|Firmware 13.0.0|2021-09-15"
            "13.1.0.0160|13.1.0|Firmware 13.1.0|2021-10-26"
            "13.2.0.0020|13.2.0|Firmware 13.2.0|2021-12-01"
            "13.2.1.0080|13.2.1|Firmware 13.2.1|2022-01-20"
            "14.0.0.1240|14.0.0|Firmware 14.0.0|2022-03-22"
            "14.1.0.0020|14.1.0|Firmware 14.1.0|2022-04-05"
            "14.1.1.0020|14.1.1|Firmware 14.1.1|2022-04-19"
            "14.1.2.0060|14.1.2|Firmware 14.1.2|2022-06-14"
            "14.1.2.5060|14.1.2-rebootless1|Firmware 14.1.2 [Rebootless Update 1]|2022-06-28"
            "14.1.2.6020|14.1.2-rebootless2|Firmware 14.1.2 [Rebootless Update 2]|2022-07-26"
