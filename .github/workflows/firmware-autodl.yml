name: 🎮 Firmware Auto Downloader

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      download_all_missing:
        description: 'Scanner et télécharger TOUT l`historique manquant (Si décoché, télécharge UNIQUEMENT la dernière version)'
        required: false
        type: boolean
        default: false
      extract_data:
        description: 'Extraire les données du système (romfs, exefs) dans un ZIP séparé'
        required: false
        type: boolean
        default: true
      build_nsp:
        description: 'Build NSP file ?'
        required: false
        type: boolean
        default: false
      firmware_version:
        description: 'Precise version (e.g., 22.0.0.1100). Leave empty for default behavior.'
        required: false
        type: string
        default: ''
      reset_and_reorder:
        description: '⚠️ DELETE ALL existing releases and recreate them in perfect chronological order?'
        required: false
        type: boolean
        default: false

env:
  BUILD_NSP: ${{ inputs.build_nsp == true && 'true' || 'false' }}
  EXTRACT_DATA: ${{ (github.event_name == 'schedule' || inputs.extract_data == true) && 'true' || 'false' }}

jobs:
  check_update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.history_check.outputs.new_version }}
      queue_json: ${{ steps.history_check.outputs.queue_json }}
    steps:
      - name: 🔍 Scan Release History & Build Queue
        id: history_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e

