name: 🛠️ Firmware Inspector & Fixer

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Tag à vérifier (ex: 1.0.0-pre). Tape ALL pour tout vérifier.'
        required: true
        type: string
        default: 'ALL'
      local_only:
        description: 'Vérification 100% locale ? (Ne tente aucun téléchargement Nintendo)'
        required: false
        type: boolean
        default: false
      build_nsp:
        description: 'Reconstruire le NSP ? (Optionnel. Si décoché, conservera le NSP existant s`il y en a un)'
        required: false
        type: boolean
        default: false
      extract_zip:
        description: 'Extraire les données du système depuis le ZIP (romfs, exefs) ?'
        required: false
        type: boolean
        default: false
      extract_nsp:
        description: 'Extraire les données du système depuis le NSP ?'
        required: false
        type: boolean
        default: false

jobs:
  prepare_matrix:
    name: 🔍 Scan & Generate Parallel Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📊 Build JSON Array
        id: set-matrix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ inputs.target_tag }}"
          if [ "$TARGET" = "ALL" ]; then
            echo "INFO: Fetching all existing tags from repository..."
            TAGS=$(gh release list -L 1000 --json tagName --jq '[.[].tagName]')
          else
            echo "INFO: Target is a single tag: $TARGET"
            TAGS=$(jq -n --arg tag "$TARGET" '[$tag]')
          fi
          
          if [ "$(echo "$TAGS" | jq 'length')" -eq 0 ]; then
            echo "ERROR: No tags found to process."
            exit 1
          fi
          
          echo "matrix=$TAGS" >> "$GITHUB_OUTPUT"

  verify_and_fix:
    name: 🛠️ Fix -> ${{ matrix.tag }}
    needs: prepare_matrix
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        tag: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 💾 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-firmware-deps
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: ⚙️ Install required modules
        run: |
          # jq et unzip sont préinstallés sur ubuntu-latest, on zappe apt-get pour gagner du temps
          pip install requests anynet cryptography tqdm beautifulsoup4

      - name: ⬇️ Setup hactool-linux
        run: |
          if [ -f "hactool-linux" ]; then
            cp hactool-linux hactool
            chmod +x hactool
          else
            echo "Error: hactool-linux not found."
            exit 1
          fi

      - name: 🕵️ Execute Verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCAL_ONLY: ${{ inputs.local_only }}
          EXTRACT_ZIP: ${{ inputs.extract_zip }}
          EXTRACT_NSP: ${{ inputs.extract_nsp }}
          TAG: ${{ matrix.tag }}
        run: |
          set +e
          
          VERSIONS=(
            "0.0.0.0330|1.0.0-pre|Firmware 1.0.0-89d9b_r49916 (pre)|2017-03-02"
