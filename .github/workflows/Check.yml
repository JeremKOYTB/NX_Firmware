            "17.0.1.0060|17.0.1|Firmware 17.0.1|2023-12-05"
            "17.0.1.5020|17.0.1-rebootless1|Firmware 17.0.1 [Rebootless Update 1]|2024-02-20"
            "18.0.0.1140|18.0.0|Firmware 18.0.0|2024-03-26"
            "18.0.1.0100|18.0.1|Firmware 18.0.1|2024-04-23"
            "18.1.0.0160|18.1.0|Firmware 18.1.0|2024-06-11"
            "18.1.0.5020|18.1.0-rebootless1|Firmware 18.1.0 [Rebootless Update 1]|2024-07-02"
            "19.0.0.1080|19.0.0|Firmware 19.0.0|2024-10-08"
            "19.0.1.0100|19.0.1|Firmware 19.0.1|2024-10-29"
            "19.0.1.5020|19.0.1-rebootless1|Firmware 19.0.1 [Rebootless Update 1]|2025-01-07"
            "19.0.2.0020|19.0.2|Firmware 19.0.2|2026-01-20"
            "20.0.0.1720|20.0.0|Firmware 20.0.0|2025-04-30"
            "20.0.1.0020|20.0.1|Firmware 20.0.1|2025-05-02"
            "20.1.0.0360|20.1.0|Firmware 20.1.0|2025-05-28"
            "20.1.1.0020|20.1.1|Firmware 20.1.1|2025-06-03"
            "20.1.5.0160|20.1.5|Firmware 20.1.5|2025-06-19"
            "20.2.0.0300|20.2.0|Firmware 20.2.0|2025-07-15"
            "20.3.0.0080|20.3.0|Firmware 20.3.0|2025-07-29"
            "20.4.0.0200|20.4.0|Firmware 20.4.0|2025-09-02"
            "20.5.0.0100|20.5.0|Firmware 20.5.0|2025-09-30"
            "21.0.0.0940|21.0.0|Firmware 21.0.0|2025-11-11"
            "21.0.1.0040|21.0.1|Firmware 21.0.1|2025-11-25"
            "21.1.0.0280|21.1.0|Firmware 21.1.0|2025-12-09"
            "21.2.0.0140|21.2.0|Firmware 21.2.0|2026-01-13"
            "22.0.0.1100|22.0.0|Firmware 22.0.0|2026-03-17"
            "22.1.0.0200|22.1.0|Firmware 22.1.0|2026-04-07"
          )

          echo "========================================"
          echo "🔍 INSPECTING RELEASE: $TAG"
          echo "========================================"

          RAW=""
          OFFICIAL_DATE=""
          
          for item in "${VERSIONS[@]}"; do
            IFS='|' read -r v_raw v_tag v_title v_date <<< "$item"
            if [ "$v_tag" = "$TAG" ]; then
              RAW="$v_raw"
              OFFICIAL_DATE="$v_date"
              break
            fi
          done

          if [ -z "$RAW" ]; then
            RAW=$(echo "$TAG" | sed 's/-card//')
            OFFICIAL_DATE=$(date +"%Y-%m-%d")
          fi

          PYTHON_ARG=$(echo "$RAW" | sed 's/-card//')
          FOLDER_NAME="Firmware ${PYTHON_ARG}"
          CORRECT_ZIP_NAME="Firmware.${TAG}.zip"
          CORRECT_NSP_NAME="Firmware.${TAG}.nsp"
          
          echo "⬇️ Downloading existing ZIP and NSP for $TAG..."
          rm -f *.zip *.nsp
          gh release download "$TAG" -p "*.zip" --clobber || true
          gh release download "$TAG" -p "*.nsp" --clobber || true
          
          DOWNLOADED_ZIP=$(ls Firmware*.zip 2>/dev/null | grep -v -i "Extracted" | head -n 1)
          DOWNLOADED_NSP=$(ls Firmware*.nsp 2>/dev/null | grep -v -i "Extracted" | head -n 1)
          
          if [ -n "$DOWNLOADED_ZIP" ] && [ -f "$DOWNLOADED_ZIP" ]; then
            ORIGINAL_ZIP_HASH=$(sha256sum "$DOWNLOADED_ZIP" | awk '{print $1}')
          else
            ORIGINAL_ZIP_HASH="Not Found"
          fi
          
          if [ "${{ inputs.build_nsp }}" == "true" ]; then
            export FORCE_BUILD_NSP="true"
            echo "INFO: NSP build requested by user."
          else
            export FORCE_BUILD_NSP="false"
            echo "INFO: NSP build skipped by user."
          fi
          
          if [ -n "$DOWNLOADED_ZIP" ]; then
            echo "📦 Extracting $DOWNLOADED_ZIP strictly to $FOLDER_NAME..."
            mkdir -p temp_extract
            unzip -q "$DOWNLOADED_ZIP" -d temp_extract
            
            mkdir -p "$FOLDER_NAME"
            find temp_extract -type f -name "*.nca" -exec mv {} "$FOLDER_NAME"/ \; 2>/dev/null || true
            rm -rf temp_extract
          else
            echo "⚠️ No ZIP found on GitHub."
          fi

          echo "⚙️ Running firmware_downloader.py..."
          echo "n" | python3 firmware_downloader.py "$PYTHON_ARG" | tee script_output.log
          
          sed -n '/Archive created:/,$p' script_output.log > changelog_body.txt
          
          sed -i -E "s/Archive created: .*/Archive created: ${CORRECT_ZIP_NAME}/g" changelog_body.txt
          sed -i -E "s/NSP created: .*/NSP created: ${CORRECT_NSP_NAME}/g" changelog_body.txt
          
          sed -i "s/LOCAL_MODE_KEEP_HASH/$ORIGINAL_ZIP_HASH/g" changelog_body.txt
          sed -i '/Not Found/d' changelog_body.txt
          
          if [ "$FORCE_BUILD_NSP" != "true" ] && [ -n "$DOWNLOADED_NSP" ]; then
            echo "INFO: Injecting existing NSP details into changelog..."
            EXISTING_HASH=$(sha256sum "$DOWNLOADED_NSP" | awk '{print $1}')
            echo "" >> changelog_body.txt
            echo "<details>" >> changelog_body.txt
            echo "<summary>Click to view NSP details </summary>" >> changelog_body.txt
            echo "" >> changelog_body.txt
            echo "NSP created: $CORRECT_NSP_NAME" >> changelog_body.txt
            echo "" >> changelog_body.txt
            echo "SHA256: $EXISTING_HASH" >> changelog_body.txt
            echo "</details>" >> changelog_body.txt
          fi
          
          echo "📅 **Official Release Date:** $OFFICIAL_DATE" > new_notes.md
          echo "" >> new_notes.md
          echo "Download of Nintendo Switch firmware version $TAG." >> new_notes.md
          echo "" >> new_notes.md
          
          if grep -q "NSP created" changelog_body.txt; then
            echo "---" >> new_notes.md
            echo "**PS: The NSP file is intended for preservation purposes only. Please use the ZIP archive for emulators and Switch hardware instead.**" >> new_notes.md
            echo "" >> new_notes.md
          fi
          
          echo "Downloaded file details:" >> new_notes.md
          echo "" >> new_notes.md
          cat changelog_body.txt >> new_notes.md
          
          NEW_ZIP="Firmware ${PYTHON_ARG}.zip"
          NEW_NSP="Firmware ${PYTHON_ARG}.nsp"
          
          # === GESTION DU ZIP ===
          if [ "$LOCAL_ONLY" == "true" ]; then
            echo "✅ Local Mode: Original ZIP left completely untouched on GitHub."
          else
            if grep -Eq "Downloading .*\.nca" script_output.log; then
              echo "🚨 Missing NCAs were downloaded by the script! Updating ZIP on GitHub..."
              mv "$NEW_ZIP" "$CORRECT_ZIP_NAME"
              gh release upload "$TAG" "$CORRECT_ZIP_NAME" --clobber
              
              if [ -n "$DOWNLOADED_ZIP" ] && [ "$DOWNLOADED_ZIP" != "$CORRECT_ZIP_NAME" ]; then
                gh release delete-asset "$TAG" "$DOWNLOADED_ZIP" -y || true
              fi
            else
              echo "✅ Keeping original ZIP (Complete mode)."
              if [ -n "$DOWNLOADED_ZIP" ] && [ "$DOWNLOADED_ZIP" != "$CORRECT_ZIP_NAME" ]; then
                echo "🔄 Fixing ZIP filename on GitHub to include the dot ($CORRECT_ZIP_NAME)..."
                mv "$DOWNLOADED_ZIP" "$CORRECT_ZIP_NAME"
                gh release upload "$TAG" "$CORRECT_ZIP_NAME" --clobber
                gh release delete-asset "$TAG" "$DOWNLOADED_ZIP" -y || true
              fi
            fi
          fi

          # === GESTION DU NSP ===
          if [ "$FORCE_BUILD_NSP" == "true" ] && [ -f "$NEW_NSP" ]; then
            if grep -Eq "Downloading .*\.nca" script_output.log && [ "$LOCAL_ONLY" != "true" ]; then
              echo "🚨 NCA downloaded: Updating NSP on GitHub..."
              mv "$NEW_NSP" "$CORRECT_NSP_NAME"
              gh release upload "$TAG" "$CORRECT_NSP_NAME" --clobber
              if [ -n "$DOWNLOADED_NSP" ] && [ "$DOWNLOADED_NSP" != "$CORRECT_NSP_NAME" ]; then
                gh release delete-asset "$TAG" "$DOWNLOADED_NSP" -y || true
              fi
            else
              if [ -n "$DOWNLOADED_NSP" ] && [ "$DOWNLOADED_NSP" != "$CORRECT_NSP_NAME" ]; then
                echo "🔄 Fixing NSP filename on GitHub to include the dot..."
                mv "$DOWNLOADED_NSP" "$CORRECT_NSP_NAME"
                gh release upload "$TAG" "$CORRECT_NSP_NAME" --clobber
                gh release delete-asset "$TAG" "$DOWNLOADED_NSP" -y || true
              elif [ -z "$DOWNLOADED_NSP" ]; then
                echo "⬆️ Uploading forced NSP..."
                mv "$NEW_NSP" "$CORRECT_NSP_NAME"
                gh release upload "$TAG" "$CORRECT_NSP_NAME" --clobber
              fi
            fi
          else
            if [ -n "$DOWNLOADED_NSP" ] && [ "$DOWNLOADED_NSP" != "$CORRECT_NSP_NAME" ]; then
              echo "🔄 Fixing existing NSP filename on GitHub to include the dot..."
              mv "$DOWNLOADED_NSP" "$CORRECT_NSP_NAME"
              gh release upload "$TAG" "$CORRECT_NSP_NAME" --clobber
              gh release delete-asset "$TAG" "$DOWNLOADED_NSP" -y || true
            fi
          fi

          # === GESTION DES EXTRACTIONS ===
          EXTRACT_ZIP_FILE=$(ls Extracted_Firmware_*.zip 2>/dev/null | head -n 1)
          if [ -n "$EXTRACT_ZIP_FILE" ] && [ -f "$EXTRACT_ZIP_FILE" ]; then 
            CORRECT_EXTRACT_ZIP="Extracted.Firmware.${TAG}.zip"
            echo "📦 Uploading Extracted ZIP Data..."
            mv "$EXTRACT_ZIP_FILE" "$CORRECT_EXTRACT_ZIP"
            gh release upload "$TAG" "$CORRECT_EXTRACT_ZIP" --clobber
          fi

          EXTRACT_NSP_FILE=$(ls Extracted_NSP_Firmware_*.zip 2>/dev/null | head -n 1)
          if [ -n "$EXTRACT_NSP_FILE" ] && [ -f "$EXTRACT_NSP_FILE" ]; then 
            CORRECT_EXTRACT_NSP="Extracted.NSP.Firmware.${TAG}.zip"
            echo "📦 Uploading Extracted NSP Data..."
            mv "$EXTRACT_NSP_FILE" "$CORRECT_EXTRACT_NSP"
            gh release upload "$TAG" "$CORRECT_EXTRACT_NSP" --clobber
          fi

          echo "📝 Updating release text..."
          gh release edit "$TAG" --notes-file new_notes.md

          # === 🔒 LOGIQUE PARALLÈLE ULTRA-SÉCURISÉE POUR ALL_TITLES.JSON ===
          if [ -f "json_updated.flag" ]; then
            echo "🚀 Nouveaux ID trouvés par ce runner ! Tentative de synchronisation sécurisée..."
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            for attempt in {1..10}; do
              git add all_titles.json
              git commit -m "Auto-update Title Database (all_titles.json) [Matrix: $TAG]" 2>/dev/null || true
              
              git pull origin main --rebase
              
              if git push origin HEAD:main; then
                echo "✅ all_titles.json fusionné et mis à jour avec succès !"
                break
              else
                echo "⚠️ Collision de push détectée (un autre runner a validé son JSON avant). Réessai dans un instant..."
                sleep $((2 + RANDOM % 6))
              fi
            done
            rm -f json_updated.flag
          fi
          
          rm -rf "$FOLDER_NAME" *.zip *.nsp script_output.log new_notes.md changelog_body.txt
          echo "⏳ Done with $TAG."
